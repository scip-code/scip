# Configuration file for https://buf.build/, which we use for Protobuf code generation.
version: v2
plugins:
  - local: protoc-gen-doc
    out: ./docs/
    opt: docs/scip.sprig,scip.md
    # NOTE: the sprig file is a template, it is not generated.
  - local: protoc-gen-go
    out: ./bindings/go/scip/
    opt:
      - paths=source_relative
  - local: protoc-gen-es
    out: ./bindings/typescript/
    opt:
      - target=ts
  - local: protoc-gen-rs
    out: ./bindings/rust/src/generated/
  - local: proto-lens-protoc
    out: ./bindings/haskell/src
  - protoc_builtin: java
    out: ./bindings/java/src/main/java/
  - protoc_builtin: kotlin
    out: ./bindings/kotlin/src/main/kotlin/
  - local: protoc-gen-scala
    out: ./bindings/scala/src/main/scala/
    # ScalaPB requires seeing every file in a single invocation; the buf
    # default `directory` strategy invokes the plugin per directory.
    strategy: all
    opt:
      # Match the Java/Kotlin package `org.scip_code.scip`. Without this,
      # ScalaPB appends the proto filename as a subpackage, producing the
      # awkward `org.scip_code.scip.scip`.
      - flat_package
