# Configuration file for https://buf.build/, which we use for Protobuf code generation.
version: v2
plugins:
  - local: protoc-gen-doc
    out: ./docs/
    opt: docs/scip.sprig,scip.md
    # NOTE: the sprig file is a template, it is not generated.
  - local: protoc-gen-go
    out: ./bindings/go/scip/
    opt:
      - paths=source_relative
  - local: protoc-gen-es
    out: ./bindings/typescript/
    opt:
      - target=ts
  - local: protoc-gen-rs
    out: ./bindings/rust/src/generated/
  - local: proto-lens-protoc
    out: ./bindings/haskell/src
  - protoc_builtin: java
    out: ./bindings/java/src/main/java/
  # The Kotlin binding only ships the DSL extensions; the underlying Java
  # message classes are consumed via a Maven dependency on scip-java, which
  # mirrors how the upstream protobuf-kotlin artifact relates to
  # protobuf-java.
  - protoc_builtin: kotlin
    out: ./bindings/kotlin/src/main/kotlin/
