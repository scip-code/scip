# Configuration file for https://buf.build/, which we use for Protobuf code generation.
version: v1
build:
  excludes:
    - .direnv
    - node_modules
    # The JVM bindings ship a copy of scip.proto as a Maven classifier
    # artifact (see bindings/{java,kotlin}/pom.xml). Exclude those copies
    # from buf's input set so we don't re-process them as duplicate
    # top-level proto files.
    - bindings/java/src/main/proto
    - bindings/kotlin/src/main/proto
lint:
  use:
    - DEFAULT
  except:
    - PACKAGE_VERSION_SUFFIX
    - ENUM_VALUE_PREFIX
    - ENUM_VALUE_UPPER_SNAKE_CASE
    - ENUM_ZERO_VALUE_SUFFIX
breaking:
  use:
    - FILE
